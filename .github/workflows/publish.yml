name: Publish Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  QUARTO_VERSION: "1.10.3"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Quarto
        id: cache-quarto
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/quarto
          key: quarto-${{ env.QUARTO_VERSION }}-${{ runner.os }}

      - name: Set up Quarto
        if: steps.cache-quarto.outputs.cache-hit != 'true'
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Add Quarto to PATH
        run: echo "/usr/local/lib/quarto/bin" >> $GITHUB_PATH

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: website
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
