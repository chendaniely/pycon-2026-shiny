name: Publish Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  QUARTO_VERSION: "1.10.3"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Quarto
        id: cache-quarto
        uses: actions/cache@v4
        with:
          path: ~/quarto
          key: quarto-${{ env.QUARTO_VERSION }}-${{ runner.os }}

      - name: Install Quarto
        if: steps.cache-quarto.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/quarto
          wget -qO quarto.tar.gz \
            "https://github.com/quarto-dev/quarto-cli/releases/download/v${{ env.QUARTO_VERSION }}/quarto-${{ env.QUARTO_VERSION }}-linux-amd64.tar.gz"
          tar -xzf quarto.tar.gz -C ~/quarto --strip-components=1
          rm quarto.tar.gz

      - name: Add Quarto to PATH
        run: echo "$HOME/quarto/bin" >> $GITHUB_PATH

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements.txt
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: website
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
